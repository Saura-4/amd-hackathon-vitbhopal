<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek USD to INR Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.2);
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(56, 189, 248, 0.15);
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(20px, -20px); }
        }

        .converter-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .converter-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 2px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .currency-symbol {
            padding: 0 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 60px;
        }

        .currency-flag {
            width: 24px;
            height: auto;
            margin-right: 8px;
            border-radius: 4px;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 20px;
            font-size: 1.5rem;
            color: var(--text-primary);
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        /* Number input arrows removal */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .exchange-icon {
            display: flex;
            justify-content: center;
            margin: -15px 0;
            position: relative;
            z-index: 10;
        }

        .exchange-btn {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid var(--card-border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: default;
        }

        .exchange-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.5s ease;
        }

        .converter-card:hover .exchange-btn svg {
            transform: rotate(180deg);
        }

        .result-group {
            margin-top: 10px;
            margin-bottom: 0;
        }

        .rate-info {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .rate-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            align-self: center;
        }

        .update-time {
            opacity: 0.7;
        }

        .loading {
            position: absolute;
            right: 20px;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .converter-card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 1.75rem;
            }
            input {
                font-size: 1.25rem;
            }
            .currency-symbol {
                font-size: 1rem;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="converter-card">
        <div class="header">
            <h1>Currency Converter</h1>
            <p>Real-time exchange rates, instantly.</p>
        </div>

        <div class="input-group">
            <label class="input-label">You Send</label>
            <div class="input-wrapper">
                <div class="currency-symbol">
                    <!-- US Flag SVG -->
                    <svg class="currency-flag" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="#f0f0f0" d="M0 0h512v512H0z"/><path fill="#d80027" d="M0 46v42h512V46zm0 84h512v42H0zm0 84h512v42H0zm0 84h512v42H0zm0 84h512v42H0z"/><path fill="#0052b4" d="M0 0h242v256H0z"/><g fill="#f0f0f0"><path d="M12 21l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm45 0l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zM35 56l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm45 0l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zM12 91l3 10h10l-8 5 3 11-8-6-8 6 3-11-8-5h10zm46 0l3 10h10l-8 5 3 11-8-6-8 6 3-11-8-5h10zm45 0l4 10h10l-8 5 3 11-8-6-8 6 3-11-8-5h10zm46 0l3 10h10l-8 5 3 11-8-6-8 6 3-11-8-5h10zm46 0l3 10h10l-8 5 3 11-8-6-8 6 3-11-8-5h10zM35 125l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm45 0l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zM12 160l3 11h10l-8 5 3 10-8-6-8 6 3-10-8-5h10zm46 0l3 11h10l-8 5 3 10-8-6-8 6 3-10-8-5h10zm45 0l4 11h10l-8 5 3 10-8-6-8 6 3-10-8-5h10zm46 0l3 11h10l-8 5 3 10-8-6-8 6 3-10-8-5h10zm46 0l3 11h10l-8 5 3 10-8-6-8 6 3-10-8-5h10zM35 195l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm45 0l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zM12 230l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm45 0l4 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10zm46 0l3 10h10l-8 6 3 10-8-6-8 6 3-10-8-6h10z"/></g></svg>
                    USD
                </div>
                <input type="number" id="usdInput" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>

        <div class="exchange-icon">
            <div class="exchange-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M11 21l-4-4h3V9h2v8h3l-4 4zm2-18l4 4h-3v8h-2V7H9l4-4z"/>
                </svg>
            </div>
        </div>

        <div class="input-group result-group">
            <label class="input-label">You Get</label>
            <div class="input-wrapper">
                <div class="currency-symbol">
                    <!-- India Flag SVG -->
                    <svg class="currency-flag" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="#f0f0f0" d="M0 0h512v512H0z"/><path fill="#ff9811" d="M0 0h512v171H0z"/><path fill="#6da544" d="M0 341h512v171H0z"/><circle cx="256" cy="256" r="65" fill="#0052b4"/><circle cx="256" cy="256" r="54" fill="#f0f0f0"/><circle cx="256" cy="256" r="41" fill="#0052b4"/><circle cx="256" cy="256" r="33" fill="#f0f0f0"/><g fill="#0052b4"><path d="M256 195l3 61-3 65-3-65zM263 196l-3 60-10 65 10-65zM271 198l-10 59-16 63 16-63zM278 201l-16 57-23 61 23-61zM285 205l-21 55-29 57 29-57zM292 210l-27 52-34 54 34-54zM298 215l-31 49-39 49 39-49zM303 222l-36 45-44 45 44-45zM308 229l-40 41-47 38 47-38zM312 236l-43 36-51 32 51-32zM315 244l-46 31-54 24 54-24zM316 251l-47 25-55 17 55-17zM317 259l-47 20-56 10 56-10zM315 267l-47 13-55 2-55-2zM313 275l-45 7-54-5 54 5zM309 283l-41 1-52-13 52 13zM305 291l-38-6-49-20 49 20zM299 298l-34-12-46-27 46 27zM293 304l-29-18-42-33 42 33zM286 310l-24-24-37-39 37 39zM278 314l-18-29-31-44 31 44zM270 317l-11-33-24-49 24 49zM262 318l-4-36-16-52 16 52zM254 318l2-38-8-55 8 55zM246 316l9-39 0-56 0 56zM238 313l16-39 8-54-8 54zM230 309l22-38 16-53-16 53zM223 304l28-36 24-50-24 50zM216 298l33-33 30-46-30 46zM210 291l38-29 37-41-37 41zM204 283l42-24 43-35-43 35zM199 276l45-19 47-28-47 28zM195 268l47-12 51-20-51 20zM194 260l48-6 54-12-54 12zM194 252l48 1 55-3-55 3zM195 244l47 8 54 5-54-5zM197 236l45 15 52 13-52-13zM201 228l42 22 50 21-50-21zM206 221l38 28 47 27-47-27zM212 215l34 33 43 34-43-34zM218 209l29 38 38 40-38-40zM226 205l23 42 32 46-32-46zM234 201l16 46 25 49-25-49zM242 198l10 49 17 52-17-52zM250 196l3 51 9 54-9-54z"/></g></svg>
                    INR
                </div>
                <!-- Readonly because we are doing a one-way conversion -->
                <input type="number" id="inrInput" placeholder="0.00" readonly>
                <div class="loading" id="loadingIndicator"></div>
            </div>
        </div>

        <div class="rate-info">
            <div class="rate-pill">
                1 USD = <span id="currentRate">--</span> INR
            </div>
            <div class="update-time">
                Last API update: <span id="lastUpdated">Fetching...</span>
            </div>
        </div>
    </div>

    <script>
        const usdInput = document.getElementById('usdInput');
        const inrInput = document.getElementById('inrInput');
        const currentRateEl = document.getElementById('currentRate');
        const lastUpdatedEl = document.getElementById('lastUpdated');
        const loadingIndicator = document.getElementById('loadingIndicator');

        let exchangeRate = null;

        // Fetch the initial rate
        async function fetchExchangeRate() {
            try {
                // Using Open ExchangeRate-API as it is free, reliable, and requires no API key
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                
                if (data.result === 'success') {
                    exchangeRate = data.rates.INR;
                    currentRateEl.textContent = exchangeRate.toFixed(2);
                    
                    // Format the date nicely based on API last update time
                    const date = new Date(data.time_last_update_unix * 1000);
                    lastUpdatedEl.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ', ' + date.toLocaleDateString();

                    // If user already typed something, convert immediately
                    if (usdInput.value) {
                        convertCurrency();
                    }
                } else {
                    throw new Error("Failed to load rates");
                }
            } catch (error) {
                console.error("Failed to fetch exchange rate:", error);
                lastUpdatedEl.textContent = "Error fetching rate";
                currentRateEl.textContent = "Error";
            }
        }

        function convertCurrency() {
            if (!exchangeRate) return;
            
            const usdAmount = parseFloat(usdInput.value);
            if (isNaN(usdAmount)) {
                inrInput.value = '';
                return;
            }

            loadingIndicator.style.display = 'block';
            
            // Simulation of small network delay for UI feel (optional but feels nice)
            // Even though calculation is instant, showing a brief loading spinner provides good feedback
            setTimeout(() => {
                const inrAmount = usdAmount * exchangeRate;
                inrInput.value = inrAmount.toFixed(2);
                loadingIndicator.style.display = 'none';
            }, 150);
        }

        // Add event listener to input
        usdInput.addEventListener('input', convertCurrency);

        // Fetch rate on page load
        fetchExchangeRate();
        
        // Refresh rate every 5 minutes (300,000 ms) to keep it live
        setInterval(fetchExchangeRate, 300000);
    </script>
</body>
</html>
